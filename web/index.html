<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>rig-bench · spec lifecycle</title>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --line:#262b36; --text:#d7dae0; --dim:#8a93a3;
          --ok:#3fb950; --warn:#d29922; --bad:#f85149; --accent:#58a6ff; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--text); font:14px/1.45 ui-monospace,SFMono-Regular,Menlo,monospace; }
  header { display:flex; gap:16px; align-items:baseline; padding:14px 18px; border-bottom:1px solid var(--line); }
  header h1 { font-size:15px; font-weight:600; }
  header .m { color:var(--dim); font-size:12px; }
  header .m b { color:var(--text); }
  #board { display:flex; gap:10px; padding:14px 18px; overflow-x:auto; align-items:flex-start; }
  .col { background:var(--panel); border:1px solid var(--line); border-radius:8px; min-width:210px; flex:1; }
  .col h2 { font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--dim);
            padding:9px 10px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; }
  .cards { padding:8px; display:flex; flex-direction:column; gap:6px; min-height:34px; }
  .card { background:var(--bg); border:1px solid var(--line); border-radius:6px; padding:7px 9px; cursor:pointer; }
  .card:hover { border-color:var(--accent); }
  .card .id { color:var(--accent); font-weight:600; }
  .card .t { display:block; color:var(--text); font-size:12.5px; margin-top:2px; }
  .card .meta { color:var(--dim); font-size:11px; margin-top:3px; }
  .card .meta .fail { color:var(--warn); }
  #detail { position:fixed; inset:0 0 0 auto; width:min(680px,92vw); background:var(--panel);
            border-left:1px solid var(--line); transform:translateX(100%); transition:transform .15s ease; overflow-y:auto; }
  #detail.open { transform:none; }
  #detail .inner { padding:18px; }
  #detail h3 { font-size:15px; margin-bottom:2px; } #detail .sub { color:var(--dim); font-size:12px; margin-bottom:12px; }
  #detail h4 { font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--dim); margin:14px 0 6px; }
  #detail table { width:100%; border-collapse:collapse; font-size:12px; }
  #detail td { padding:3px 6px 3px 0; color:var(--dim); vertical-align:top; }
  #detail td:first-child { white-space:nowrap; }
  .pill { display:inline-block; border:1px solid var(--line); border-radius:99px; padding:1px 8px; font-size:11px; }
  .PASS { color:var(--ok); border-color:var(--ok); } .FAIL { color:var(--bad); border-color:var(--bad); }
  .drift-yes { color:var(--warn); } .drift-no { color:var(--ok); }
  pre { background:var(--bg); border:1px solid var(--line); border-radius:6px; padding:10px;
        font-size:12px; overflow-x:auto; white-space:pre-wrap; color:var(--text); }
  #close { float:right; background:none; border:1px solid var(--line); color:var(--dim);
           border-radius:6px; padding:2px 9px; cursor:pointer; } #close:hover { color:var(--text); }
  .btn { background:none; border:1px solid var(--line); color:var(--dim); border-radius:6px;
         padding:2px 9px; cursor:pointer; font:inherit; font-size:12px; } .btn:hover { color:var(--text); }
  .btn.danger:hover { color:var(--bad); border-color:var(--bad); }
  input, textarea { width:100%; background:var(--bg); border:1px solid var(--line); color:var(--text);
                    border-radius:6px; padding:6px 8px; font:inherit; font-size:12.5px; }
  textarea { resize:vertical; }
  .empty { color:var(--dim); font-size:12px; padding:4px 2px; }
  a { color:var(--accent); text-decoration:none; }
  .md { font-size:13px; }
  .md h1 { font-size:15px; margin:14px 0 6px; } .md h2 { font-size:13px; margin:12px 0 5px; }
  .md h3 { font-size:12px; margin:10px 0 4px; color:var(--dim); text-transform:uppercase; letter-spacing:.06em; }
  .md p { margin:0 0 8px; } .md ul, .md ol { margin:0 0 8px 18px; padding:0; } .md li { margin:2px 0; }
  .md code { background:var(--bg); border:1px solid var(--line); border-radius:4px; padding:0 4px; font-size:12px; }
  .md pre { margin:0 0 8px; }
  .md img { max-width:100%; display:block; margin:6px 0 8px; border:1px solid var(--line); border-radius:6px; }
</style>
</head>
<body>
<header>
  <h1>rig-bench · spec lifecycle</h1>
  <span class="m" id="metrics">loading…</span>
  <span class="m" style="margin-left:auto"><a href="#" onclick="newSpecForm();return false">+ new spec</a> · <a href="#" onclick="toggleMemory();return false" id="memlink">memory ▾</a> · <a href="#" onclick="toggleResearch();return false" id="reslink">research ▾</a></span>
</header>
<div id="board"></div>
<div id="memory" style="display:none; padding:0 18px 18px">
  <div class="col" style="min-width:0">
    <h2><span>memory notebooks</span><span id="memcount"></span></h2>
    <div class="cards" id="memlist"></div>
  </div>
</div>
<div id="research" style="display:none; padding:0 18px 18px">
  <div class="col" style="min-width:0">
    <h2><span>research reports</span><span id="rescount"></span></h2>
    <div class="cards" id="reslist"></div>
  </div>
</div>
<aside id="detail"><div class="inner" id="detail-inner"></div></aside>

<script>
const $ = (s) => document.querySelector(s);
const api = (p) => fetch(p).then((r) => r.json());
// mutation helper: throws with the server's error text so callers can alert() it
const send = (p, method, body) => fetch(p, {
  method,
  headers: body ? { "content-type": "application/json" } : {},
  body: body ? JSON.stringify(body) : undefined,
}).then(async (r) => {
  if (!r.ok) throw new Error((await r.json().catch(() => ({}))).error ?? `HTTP ${r.status}`);
  return r.json();
});
const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));

async function board() {
  const [states, specs, metrics] = await Promise.all([
    api("/api/states"), api("/api/specs"), api("/api/metrics"),
  ]);
  $("#metrics").innerHTML =
    `total <b>${specs.length}</b> · finished <b>${metrics.finished}</b> · ` +
    `failure rate <b>${metrics.failure_rate_pct}%</b> (finished w/ failed attempts: ${metrics.finished_with_failed_attempts})`;
  const byState = {};
  for (const s of specs) (byState[s.status] ??= []).push(s);
  $("#board").innerHTML = states.map((st) => `
    <div class="col">
      <h2><span>${esc(st.name)}</span><span>${(byState[st.name] ?? []).length}</span></h2>
      <div class="cards">
        ${(byState[st.name] ?? []).map((s) => `
          <div class="card" onclick="detail('${esc(s.project)}','${esc(s.id)}')">
            <span class="id">${esc(s.project)}/${esc(s.id)}</span>
            <span class="t">${esc(s.title)}</span>
            <span class="meta">${s.verify_attempts > 0 ? `<span class="fail">attempts ${s.verify_attempts}</span> · ` : ""}${esc(s.axis) || ""}</span>
          </div>`).join("") || `<div class="empty">—</div>`}
      </div>
    </div>`).join("");
}

async function detail(project, id) {
  const [s, drift, mem] = await Promise.all([
    api(`/api/specs/${project}/${id}`), api(`/api/specs/${project}/${id}/drift`),
    api(`/api/memory?spec_id=${id}`),
  ]);
  const inner = $("#detail-inner");
  inner.innerHTML = `
    <button id="close" onclick="document.getElementById('detail').classList.remove('open')">close</button>
    <h3>${esc(s.project)}/${esc(s.id)} — ${esc(s.title)}</h3>
    <div class="sub">
      <span class="pill">${esc(s.status)}</span>
      ${s.axis ? `<span class="pill">${esc(s.axis)}</span>` : ""}
      ${s.pr ? ` · <a href="${esc(s.pr)}">PR</a>` : ""} ${s.branch ? ` · ${esc(s.branch)}` : ""}
      · <button class="btn" id="spec-edit">edit</button> <button class="btn danger" id="spec-delete">delete</button>
    </div>
    <h4>dependencies</h4>
    <div>${s.depends_on.length ? s.depends_on.map((d) => `<span class="pill">${esc(d)}</span>`).join(" ") : '<span class="empty">none</span>'}</div>
    <h4>criteria drift</h4>
    <div>${!drift.comparable ? '<span class="empty">fewer than two snapshots</span>'
        : drift.changed
          ? `<span class="drift-yes">CHANGED between '${esc(drift.prev.at_state)}' and '${esc(drift.latest.at_state)}'</span>`
          : `<span class="drift-no">unchanged since '${esc(drift.prev.at_state)}'</span>`}</div>
    <h4>transitions</h4>
    <table>${s.transitions.map((t) => `<tr><td>${esc(t.at)}</td><td>${esc(t.from_state ?? "·")} → ${esc(t.to_state)}</td><td>${esc(t.actor)}</td></tr>`).join("") || "<tr><td class='empty'>none</td></tr>"}</table>
    <h4>verification attempts</h4>
    <table>${s.attempts.map((a) => `<tr><td>attempt-${a.n}</td><td><span class="pill ${a.overall}">${a.overall}</span></td>
      <td>${esc(a.at)}</td><td><a href="#" onclick="trace('${esc(project)}','${esc(id)}',${a.n});return false">trace</a></td></tr>`).join("") || "<tr><td class='empty'>none</td></tr>"}</table>
    <div id="trace"></div>
    <h4>related memory</h4>
    ${mem.length ? mem.map((m) => `
      <details><summary><span class="pill">${esc(m.notebook)}</span> ${esc(m.heading)}</summary>
      <pre>${esc(m.body)}</pre></details>`).join("") : '<div class="empty">no tagged entries</div>'}
    <h4>spec body</h4>
    <pre>${esc(s.body_md)}</pre>`;
  // status is deliberately absent from the edit surface — lifecycle moves stay with
  // `spec-db.mjs move` and its valid_next/dependency gates
  $("#spec-edit").onclick = () => specEditForm(s);
  $("#spec-delete").onclick = async () => {
    if (!confirm(`Delete ${s.project}/${s.id} "${s.title}"? Removes the spec file, traces, and DB history. Ledger entries are kept. This cannot be undone.`)) return;
    try { await send(`/api/specs/${s.project}/${s.id}`, "DELETE"); } catch (e) { alert(e.message); return; }
    $("#detail").classList.remove("open");
    board();
  };
  $("#detail").classList.add("open");
}

function specEditForm(s) {
  $("#detail-inner").innerHTML = `
    <button id="close" onclick="document.getElementById('detail').classList.remove('open')">close</button>
    <h3>edit ${esc(s.project)}/${esc(s.id)}</h3>
    <div class="sub"><span class="pill">${esc(s.status)}</span> · status changes go through 'spec-db.mjs move', not this form</div>
    <h4>title</h4><input id="s-title">
    <h4>axis</h4><input id="s-axis">
    <h4>branch</h4><input id="s-branch">
    <h4>pr</h4><input id="s-pr">
    <h4>body (markdown)</h4><textarea id="s-body" rows="20"></textarea>
    <div style="margin-top:10px"><button class="btn" id="s-save">save</button> <button class="btn" id="s-cancel">cancel</button></div>`;
  $("#s-title").value = s.title;
  $("#s-axis").value = s.axis;
  $("#s-branch").value = s.branch;
  $("#s-pr").value = s.pr;
  $("#s-body").value = s.body_md;
  $("#s-cancel").onclick = () => detail(s.project, s.id);
  $("#s-save").onclick = async () => {
    const patch = {
      title: $("#s-title").value, axis: $("#s-axis").value,
      branch: $("#s-branch").value, pr: $("#s-pr").value, body: $("#s-body").value,
    };
    try { await send(`/api/specs/${s.project}/${s.id}`, "PATCH", patch); } catch (e) { alert(e.message); return; }
    board();
    detail(s.project, s.id);
  };
  $("#detail").classList.add("open");
}

async function newSpecForm() {
  const specs = await api("/api/specs");
  $("#detail-inner").innerHTML = `
    <button id="close" onclick="document.getElementById('detail').classList.remove('open')">close</button>
    <h3>new spec</h3>
    <div class="sub">creates a draft stub with the next id — flesh it out via spec-plan before it can move to ready</div>
    <h4>project</h4><input id="n-project">
    <h4>title</h4><input id="n-title">
    <h4>axis (optional)</h4><input id="n-axis">
    <h4>body (optional — template skeleton if empty)</h4><textarea id="n-body" rows="12"></textarea>
    <div style="margin-top:10px"><button class="btn" id="n-save">create</button> <button class="btn" id="n-cancel">cancel</button></div>`;
  $("#n-project").value = specs[0]?.project ?? "";
  $("#n-cancel").onclick = () => $("#detail").classList.remove("open");
  $("#n-save").onclick = async () => {
    const body = { project: $("#n-project").value.trim(), title: $("#n-title").value.trim() };
    if ($("#n-axis").value.trim()) body.axis = $("#n-axis").value.trim();
    if ($("#n-body").value.trim()) body.body = $("#n-body").value;
    let r;
    try { r = await send("/api/specs", "POST", body); } catch (e) { alert(e.message); return; }
    board();
    detail(r.project, r.id);
  };
  $("#detail").classList.add("open");
}

async function trace(project, id, n) {
  const a = await api(`/api/specs/${project}/${id}/attempts/${n}`);
  $("#trace").innerHTML = `<h4>attempt-${n} trace</h4><pre>${esc(a.trace_md || "(empty)")}</pre>`;
}

async function toggleMemory() {
  const el = $("#memory");
  const open = el.style.display === "none";
  el.style.display = open ? "block" : "none";
  $("#memlink").textContent = open ? "memory ▴" : "memory ▾";
  if (open) loadMemory();
}

async function loadMemory() {
  const entries = await api("/api/memory");
  $("#memcount").textContent = entries.length;
  $("#memlist").innerHTML = entries.length ? entries.map((m, i) => `
    <details class="card"><summary><span class="pill">${esc(m.notebook)}</span> ${esc(m.heading)}
      ${m.spec_id ? `<span class="pill">spec ${esc(m.spec_id)}</span>` : ""}</summary>
      <pre>${esc(m.body)}</pre>
      <div style="margin:6px 0 2px"><button class="btn" data-mem-edit="${i}">edit</button>
        <button class="btn danger" data-mem-del="${i}">delete</button></div></details>`).join("")
    : '<div class="empty">no entries — run spec-db.mjs import / memory add</div>';
  // handlers close over the fetched entries array — notebook names and headings never
  // pass through string-interpolated onclick attributes
  document.querySelectorAll("[data-mem-edit]").forEach((b) => {
    b.onclick = () => memoryEditForm(entries[Number(b.dataset.memEdit)]);
  });
  document.querySelectorAll("[data-mem-del]").forEach((b) => {
    b.onclick = async () => {
      const m = entries[Number(b.dataset.memDel)];
      if (!confirm(`Delete ${m.notebook}#${m.seq}? Its number will not be reused.`)) return;
      try { await send(`/api/memory/${encodeURIComponent(m.notebook)}/${m.seq}`, "DELETE"); } catch (e) { alert(e.message); return; }
      loadMemory();
    };
  });
}

function memoryEditForm(m) {
  $("#detail-inner").innerHTML = `
    <button id="close" onclick="document.getElementById('detail').classList.remove('open')">close</button>
    <h3>edit memory entry</h3>
    <div class="sub"><span class="pill">${esc(m.notebook)}#${m.seq}</span></div>
    <h4>heading</h4><input id="m-heading">
    <h4>spec id (optional)</h4><input id="m-specid">
    <h4>body</h4><textarea id="m-body" rows="14"></textarea>
    <div style="margin-top:10px"><button class="btn" id="m-save">save</button> <button class="btn" id="m-cancel">cancel</button></div>`;
  $("#m-heading").value = m.heading;
  $("#m-specid").value = m.spec_id;
  $("#m-body").value = m.body;
  $("#m-cancel").onclick = () => $("#detail").classList.remove("open");
  $("#m-save").onclick = async () => {
    const patch = { heading: $("#m-heading").value, spec_id: $("#m-specid").value, body: $("#m-body").value };
    try { await send(`/api/memory/${encodeURIComponent(m.notebook)}/${m.seq}`, "PATCH", patch); } catch (e) { alert(e.message); return; }
    $("#detail").classList.remove("open");
    loadMemory();
  };
  $("#detail").classList.add("open");
}

async function toggleResearch() {
  const el = $("#research");
  const open = el.style.display === "none";
  el.style.display = open ? "block" : "none";
  $("#reslink").textContent = open ? "research ▴" : "research ▾";
  if (open) loadResearch();
}

async function loadResearch() {
  const reports = await api("/api/research");
  $("#rescount").textContent = reports.length;
  $("#reslist").innerHTML = reports.length ? reports.map((r) => `
    <div class="card" onclick="researchDetail(${r.seq})">
      <span class="t" style="margin-top:0">${esc(r.title)}</span>
      <span class="meta">${esc(r.topic)}</span>
      <span class="meta">${esc(r.created_at).slice(0, 10)} · ${r.sources.length} source${r.sources.length === 1 ? "" : "s"}</span>
    </div>`).join("") : '<div class="empty">no reports — run /research &lt;topic&gt;</div>';
}

const refreshResearchIfOpen = () => { if ($("#research").style.display !== "none") loadResearch(); };

async function researchDetail(seq) {
  const r = await api(`/api/research/${seq}`);
  const srcs = r.sources.filter((s) => /^https?:\/\//.test(s));
  $("#detail-inner").innerHTML = `
    <button id="close" onclick="document.getElementById('detail').classList.remove('open')">close</button>
    <h3>${esc(r.title)}</h3>
    <div class="sub"><span class="pill">research#${r.seq}</span> · ${esc(r.topic)} · ${esc(r.created_at)}
      · <button class="btn" id="res-edit">edit</button> <button class="btn danger" id="res-delete">delete</button></div>
    <h4>sources</h4>
    <div>${srcs.length ? srcs.map((s) => `<div><a href="${esc(s)}" target="_blank" rel="noopener">${esc(s)}</a></div>`).join("") : '<span class="empty">none</span>'}</div>
    <h4>report</h4>
    <div class="md">${md(r.body_md)}</div>`;
  // handlers close over the fetched report object — form values are never harvested
  // back out of rendered (esc()-encoded) HTML
  $("#res-edit").onclick = () => researchEditForm(r);
  $("#res-delete").onclick = async () => {
    if (!confirm(`Delete research#${r.seq} (${r.slug})? This cannot be undone.`)) return;
    try { await send(`/api/research/${r.seq}`, "DELETE"); } catch (e) { alert(e.message); return; }
    $("#detail").classList.remove("open");
    refreshResearchIfOpen();
  };
  $("#detail").classList.add("open");
}

function researchEditForm(r) {
  $("#detail-inner").innerHTML = `
    <button id="close" onclick="document.getElementById('detail').classList.remove('open')">close</button>
    <h3>edit research#${r.seq}</h3>
    <div class="sub"><span class="pill">${esc(r.slug)}</span> · slug is the citation key and never changes</div>
    <h4>title</h4><input id="f-title">
    <h4>topic</h4><input id="f-topic">
    <h4>sources (one URL per line)</h4><textarea id="f-sources" rows="4"></textarea>
    <h4>report body (markdown)</h4><textarea id="f-body" rows="18"></textarea>
    <div style="margin-top:10px"><button class="btn" id="f-save">save</button> <button class="btn" id="f-cancel">cancel</button></div>`;
  $("#f-title").value = r.title;
  $("#f-topic").value = r.topic;
  $("#f-sources").value = r.sources.join("\n");
  $("#f-body").value = r.body_md;
  $("#f-cancel").onclick = () => researchDetail(r.seq);
  $("#f-save").onclick = async () => {
    const patch = {
      title: $("#f-title").value,
      topic: $("#f-topic").value,
      body_md: $("#f-body").value,
      sources: $("#f-sources").value.split("\n").map((s) => s.trim()).filter(Boolean),
    };
    try { await send(`/api/research/${r.seq}`, "PATCH", patch); } catch (e) { alert(e.message); return; }
    refreshResearchIfOpen();
    researchDetail(r.seq);
  };
}

// minimal markdown renderer for research bodies. esc() runs over the whole source FIRST,
// so any HTML in the input is inert — the only tags in the output are the ones emitted
// here, and links/image sources are restricted to http(s) URLs (esc() has already
// neutralized quotes, so URLs can't break out of the attribute).
function md(src) {
  const inline = (s) => s
    .replace(/!\[([^\]]*)\]\((https?:\/\/[^)\s]+)\)/g, '<img src="$2" alt="$1" loading="lazy">')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/\*\*([^*]+)\*\*/g, "<b>$1</b>")
    .replace(/`([^`]+)`/g, "<code>$1</code>");
  const out = [];
  let listTag = null, fence = false, para = [];
  const flushPara = () => { if (para.length) { out.push(`<p>${inline(para.join(" "))}</p>`); para = []; } };
  const closeList = () => { if (listTag) { out.push(`</${listTag}>`); listTag = null; } };
  const openList = (tag) => { if (listTag !== tag) { closeList(); out.push(`<${tag}>`); listTag = tag; } };
  for (const line of esc(src).split("\n")) {
    if (/^```/.test(line)) { flushPara(); closeList(); out.push(fence ? "</pre>" : "<pre>"); fence = !fence; continue; }
    if (fence) { out.push(line); continue; }
    const h = line.match(/^(#{1,3}) (.*)$/);
    if (h) { flushPara(); closeList(); out.push(`<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`); continue; }
    const ul = line.match(/^\s*[-*] (.*)$/);
    if (ul) { flushPara(); openList("ul"); out.push(`<li>${inline(ul[1])}</li>`); continue; }
    const ol = line.match(/^\s*\d+\. (.*)$/);
    if (ol) { flushPara(); openList("ol"); out.push(`<li>${inline(ol[1])}</li>`); continue; }
    if (!line.trim()) { flushPara(); closeList(); continue; }
    para.push(line.trim());
  }
  flushPara(); closeList(); if (fence) out.push("</pre>");
  return out.join("\n");
}

board();
setInterval(board, 15000);
</script>
</body>
</html>
