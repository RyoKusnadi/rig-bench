name: Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The transition-enforcement check in check-specs.sh (spec 0014) diffs spec
      # folders against origin/main; a fetch-depth-1 PR checkout doesn't have that
      # ref, and the check would silently skip (fail-open). Fetch it explicitly.
      - name: fetch base ref for transition check
        run: git fetch --no-tags --depth=1 origin +refs/heads/main:refs/remotes/origin/main
        continue-on-error: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # State-table sync + per-spec consistency (dep graph, status/folder, sizing).
      - name: make check
        run: make check

      # Hook + lifecycle-script suites. The script tests run the .sh files under
      # /bin/bash; note CI's bash is 4+, so the bash-3.2 floor (memory/gotchas.md)
      # is only truly exercised on macOS — don't introduce bash-4isms and rely on
      # CI to catch them.
      - name: npm test
        run: npm test
