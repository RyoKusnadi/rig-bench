# Canonical spec-lifecycle state table — DATA ONLY.
#
# This is not orchestration code and does not run anything. It's the machine-readable
# form of the table in specs/README.md's "State Transitions" section, so a future tool
# (or a human) can read the states/folders/transitions from one place without re-parsing
# prose. Deliberately just data — not agent-coupled, kept separate from any
# dispatch/orchestration decision (see memory/decisions.md).
#
# specs/README.md remains the canonical *prose* explanation (the retry contract, the
# un-blocking procedure, the reasoning) — this file only carries the structural facts:
# state names, folders, who transitions a spec into that state, and valid next states.
# If you change one, change the other — scripts/check-state-sync.sh (run by
# `make check`) fails on drift between this file and the README's table.

retry:
  max_verify_attempts: 2

dispatch:
  max_concurrent: 3
  attempts_field: verify_attempts
  failure_section_header: "## Verification Failures"

# Advisory threshold consumed at runtime by scripts/spec-status.sh: when the share of
# finished specs with verify_attempts > 0 exceeds this percentage, the status view prints
# an attention line. Data lives only here (no prose copy, so no sync check applies).
attention:
  verify_failure_rate_threshold_pct: 50

# Whether spec markdown files (and their .traces/ directories) are committed to git.
# tracked: true is the original convention — lifecycle moves are force-added past the
# gitignore so every state change is reviewable in PRs, and the transition (spec 0014)
# and criteria-drift (spec 0030) checks can compare against a base ref. tracked: false
# (this repo's owner preference, 2026-07-08 — see memory/decisions.md) keeps spec
# documents as local working state: PRs carry implementation changes only, the skills
# skip the add/commit of spec and trace paths, and those two base-ref checks are
# dormant for spec files. Data lives only here (no prose copy, so no sync check applies).
spec_files:
  tracked: false

states:
  - name: draft
    folder: draft
    entered_by: [spec-plan]
    valid_next: [ready]

  - name: ready
    folder: ready
    entered_by: [spec-plan, human]
    valid_next: [in_progress]

  - name: in_progress
    folder: in_progress
    entered_by: [spec-exec]
    valid_next: [waiting_verification]

  - name: waiting_verification
    folder: waiting_verification
    entered_by: [spec-exec]
    valid_next: [finished, blocked]

  - name: finished
    folder: finished
    entered_by: [spec-verify]
    valid_next: []

  - name: blocked
    folder: blocked
    entered_by: [spec-verify, human]
    valid_next: [ready, in_progress]

  - name: abandoned
    folder: abandoned
    entered_by: [human]
    valid_next: []
